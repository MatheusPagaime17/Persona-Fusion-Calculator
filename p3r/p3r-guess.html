<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Persona Guess - P3R</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        /* --- VARIÁVEIS E ESTILOS GLOBAIS (Tema P3R) --- */
        :root {
            --p3-blue-dark: #000a1a;
            --p3-blue-deep: #001a33;
            --p3-blue-mid: #003366;
            --p3-blue-bright: #00aaff;
            --p3-blue-glow: #4dffff;
            --p3-moon-white: #e6f2ff;
            --correct-green: #00cc44;
            --partial-yellow: #ffcc00;
            --incorrect-red: #cc0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            color: var(--p3-moon-white);
            background-color: var(--p3-blue-dark);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 85, 255, 0.2) 0%, transparent 70%), linear-gradient(180deg, #000510 0%, #001a33 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ondas de Fundo */
        body::before {
            content: ""; position: fixed; bottom: 0; left: 0; width: 100%; height: 30vh;
            background: linear-gradient(to top, rgba(0, 170, 255, 0.1), transparent);
            filter: blur(5px); z-index: -2; pointer-events: none;
            animation: pulseGlow 5s infinite alternate;
        }
        @keyframes pulseGlow { from { opacity: 0.3; height: 30vh; } to { opacity: 0.6; height: 35vh; } }

        /* --- LOADER --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a00 0%, #000 70%);
            z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.5s;
        }
        #loader-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-text { color: #ccff00; font-weight: 700; letter-spacing: 3px; animation: blinkText 1s infinite alternate; margin-top: 20px;}
        @keyframes blinkText { from { opacity: 0.4; } to { opacity: 1; } }

        /* --- HEADER --- */
        header {
            background: rgba(0, 10, 25, 0.85); backdrop-filter: blur(10px);
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(77, 255, 255, 0.3); box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
            width: 100%; position: fixed; top: 0; left: 0; z-index: 100;
        }
        .logo { font-size: 1.5em; font-weight: 900; font-style: italic; color: var(--p3-blue-glow); text-transform: uppercase; }
        nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 700; text-transform: uppercase; margin-left: 20px; transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--p3-blue-glow); text-shadow: 0 0 8px var(--p3-blue-glow); }

        /* --- GAME CONTAINER --- */
        .game-container {
            width: 95%; max-width: 900px;
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { font-style: italic; font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 0px rgba(0, 85, 255, 0.5); margin-bottom: 5px; font-size: 2.5em; }
        p.subtitle { color: #b3d9ff; margin-bottom: 20px; font-size: 1.1em; }

        /* Controles de Modo */
        .mode-toggles { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .mode-btn {
            background: rgba(0, 20, 40, 0.6); border: 1px solid var(--p3-blue-mid);
            color: var(--p3-moon-white); padding: 10px 20px; font-family: 'Exo 2'; font-weight: 700;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .mode-btn.active { background: var(--p3-blue-glow); color: #000; font-weight: 900; box-shadow: 0 0 15px var(--p3-blue-glow); }

        /* Barra de Busca */
        .search-area { position: relative; max-width: 400px; margin: 0 auto 30px auto; }
        .search-input {
            width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(77, 255, 255, 0.3);
            border-bottom: 2px solid var(--p3-blue-bright); color: #fff; font-family: 'Exo 2'; font-size: 1.1em; font-weight: 700;
            text-align: center; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--p3-blue-glow); box-shadow: 0 0 15px rgba(0, 170, 255, 0.3); }
        .search-input:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .autocomplete-results {
            position: absolute; top: 100%; left: 0; width: 100%; background: rgba(0, 15, 30, 0.95);
            border: 1px solid var(--p3-blue-mid); max-height: 200px; overflow-y: auto; z-index: 20; text-align: left; display: none;
        }
        .result-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .result-item:hover { background: rgba(0, 170, 255, 0.2); color: var(--p3-blue-glow); }

        /* Status do Jogo */
        .game-status { font-weight: 700; font-size: 1.2em; margin-bottom: 15px; color: var(--p3-blue-glow); }

        /* --- GRID DE TENTATIVAS --- */
        .grid-wrapper { overflow-x: auto; padding-bottom: 10px; }
        .guesses-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.5fr 1.5fr 1.5fr;
            gap: 10px; min-width: 800px; margin: 0 auto;
        }
        
        .grid-header {
            font-weight: 900; text-transform: uppercase; color: var(--p3-blue-bright);
            padding: 10px; border-bottom: 2px solid var(--p3-blue-mid); font-size: 0.9em;
        }

        /* Linha de Tentativa */
        .guess-row { display: contents; }
        .guess-cell {
            background: rgba(0, 10, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 10px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 700; text-align: center; font-size: 0.9em;
            opacity: 0; transform: rotateX(-90deg);
        }

        /* Cores de Feedback */
        .cell-correct { background-color: rgba(0, 204, 68, 0.8); border-color: var(--correct-green); text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .cell-partial { background-color: rgba(204, 153, 0, 0.8); border-color: var(--partial-yellow); text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .cell-incorrect { background-color: rgba(153, 0, 0, 0.8); border-color: var(--incorrect-red); text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        
        .cell-name { font-style: italic; color: var(--p3-moon-white); background: rgba(0, 20, 40, 0.8) !important; border-color: var(--p3-blue-mid) !important; }

        .arrow { font-size: 1.2em; margin-left: 5px; }

        /* Animação de Revelação */
        @keyframes flipIn {
            0% { opacity: 0; transform: rotateX(-90deg); }
            100% { opacity: 1; transform: rotateX(0deg); }
        }

        /* --- MODAL DE VITÓRIA/DERROTA --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.9); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: linear-gradient(160deg, #001a33, #000); padding: 40px; border: 1px solid var(--p3-blue-glow);
            text-align: center; max-width: 500px; width: 90%; box-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
            clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
            position: relative;
        }
        
        /* NOVO: Botão de Fechar X no modal de jogo */
        .close-modal-btn { 
            position: absolute; top: 15px; right: 20px; background: transparent; border: none; 
            color: var(--p3-blue-bright); font-size: 2.5em; cursor: pointer; transition: all 0.3s ease; 
            z-index: 100; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
        }
        .close-modal-btn:hover { 
            color: var(--p3-blue-dark) !important; 
            background-color: var(--p3-blue-glow); 
            transform: rotate(90deg); 
            box-shadow: 0 0 15px var(--p3-blue-glow);
        }

        .modal-title { font-size: 2.5em; font-style: italic; font-weight: 900; margin-bottom: 10px; }
        .modal-title.win { color: var(--correct-green); text-shadow: 0 0 10px var(--correct-green); }
        .modal-title.loss { color: var(--incorrect-red); text-shadow: 0 0 10px var(--incorrect-red); }
        .target-reveal { font-size: 1.5em; color: var(--p3-blue-glow); margin: 20px 0; font-weight: 700; }
        
        /* NOVO: Container para os botões de ação */
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: transparent; color: var(--p3-blue-glow); border: 2px solid var(--p3-blue-glow);
            padding: 10px 25px; font-family: 'Exo 2'; font-weight: 800; font-size: 1.1em; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }
        .action-btn:hover { background: var(--p3-blue-glow); color: #000; box-shadow: 0 0 15px var(--p3-blue-glow); }

    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loading-text" id="loading-text">CARREGANDO COMPÊNDIO...</div>
    </div>

    <header>
        <div class="logo">Persona Fusion Hub</div>
        <nav>
            <a href="index.html">Voltar para Calculadora</a>
        </nav>
    </header>

    <div class="game-container">
        <h1>Persona Guess</h1>
        <p class="subtitle">Adivinhe a Persona misteriosa. Cores indicam o quão perto você está!</p>

        <div class="mode-toggles">
            <button class="mode-btn active" id="btn-daily">Modo Diário</button>
            <button class="mode-btn" id="btn-training">Modo Treino</button>
        </div>

        <div class="game-status" id="game-status">Tentativa 1 de 8</div>

        <div class="search-area">
            <input type="text" id="guess-input" class="search-input" placeholder="Digite o nome da Persona..." autocomplete="off">
            <div class="autocomplete-results" id="autocomplete-results"></div>
        </div>

        <div class="grid-wrapper">
            <div class="guesses-grid" id="guesses-grid">
                <!-- Header do Grid -->
                <div class="grid-header">Persona</div>
                <div class="grid-header">Arcana</div>
                <div class="grid-header">Lvl</div>
                <div class="grid-header">Fraquezas</div>
                <div class="grid-header">Resistências</div>
                <div class="grid-header">Imunidades</div>
                <!-- As tentativas aparecerão aqui -->
            </div>
        </div>
    </div>

    <!-- Modal de Resultado (Atualizado com X e Botão de Fechar) -->
    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <button class="close-modal-btn" id="close-result-modal">&times;</button>

            <h2 class="modal-title" id="modal-title">Você Venceu!</h2>
            <p id="modal-msg">A Persona alvo era:</p>
            <div class="target-reveal" id="modal-target-name">Orpheus</div>
            
            <div class="modal-actions">
                <button class="action-btn" id="view-grid-btn">Ver Painel</button>
                <button class="action-btn" id="play-again-btn">Jogar Novamente</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Elementos DOM
            const loader = document.getElementById('loader-overlay');
            const loadingText = document.getElementById('loading-text');
            const input = document.getElementById('guess-input');
            const autocomplete = document.getElementById('autocomplete-results');
            const grid = document.getElementById('guesses-grid');
            const statusText = document.getElementById('game-status');
            const btnDaily = document.getElementById('btn-daily');
            const btnTraining = document.getElementById('btn-training');
            
            // Modal Elements
            const modal = document.getElementById('result-modal');
            const playAgainBtn = document.getElementById('play-again-btn');
            const viewGridBtn = document.getElementById('view-grid-btn');
            const closeResultBtn = document.getElementById('close-result-modal');

            let personas = [];
            let guessablePersonas = [];
            let targetPersona = null;
            let currentMode = 'daily'; // 'daily' ou 'training'
            let guesses = [];
            const MAX_GUESSES = 8;

            // --- INICIALIZAÇÃO DA API (Mesma lógica segura da calculadora) ---
            async function loadData() {
                const CACHE_KEY = 'p3r_compendium_data';
                const cachedData = localStorage.getItem(CACHE_KEY);
                
                if (cachedData) {
                    processPersonas(JSON.parse(cachedData));
                    loader.classList.add('hidden');
                    initGame();
                    return;
                }

                loadingText.textContent = "CONECTANDO AO SERVIDOR (PODE DEMORAR 50S)...";
                try {
                    const apiUrl = 'https://persona-compendium.onrender.com/personas/';
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error('API Error');
                    
                    const apiData = await response.json();
                    localStorage.setItem(CACHE_KEY, JSON.stringify(apiData));
                    processPersonas(apiData);
                    loader.classList.add('hidden');
                    initGame();
                } catch (error) {
                    loadingText.textContent = "ERRO NA API";
                    loadingText.style.color = "red";
                    alert("A API demorou demasiado a responder. Abra a calculadora principal para ativar o cache primeiro.");
                }
            }

            function processPersonas(data) {
                personas = data;
                guessablePersonas = personas.filter(p => p.dlc === 0);
            }

            // --- LÓGICA DO JOGO ---
            function initGame() {
                input.value = '';
                input.disabled = false;
                guesses = [];
                while(grid.children.length > 6) { grid.removeChild(grid.lastChild); }
                
                if (currentMode === 'daily') {
                    targetPersona = getDailyTarget();
                    loadDailyState(); 
                } else {
                    targetPersona = guessablePersonas[Math.floor(Math.random() * guessablePersonas.length)];
                }
                
                updateStatus();
                modal.classList.remove('open');
            }

            function getDailyTarget() {
                const today = new Date().toISOString().split('T')[0];
                let hash = 0;
                for (let i = 0; i < today.length; i++) {
                    hash = today.charCodeAt(i) + ((hash << 5) - hash);
                }
                const index = Math.abs(hash) % guessablePersonas.length;
                return guessablePersonas[index];
            }

            function getImmunities(p) {
                return [...(p.nullifies || []), ...(p.reflects || []), ...(p.absorbs || [])];
            }

            function compareArrays(arrGuess, arrTarget) {
                if (!arrGuess || !arrTarget) return 'incorrect';
                if (arrGuess.length === 0 && arrTarget.length === 0) return 'correct';
                if (arrGuess.length === 0 || arrTarget.length === 0) return 'incorrect';
                
                const sortedG = [...arrGuess].sort();
                const sortedT = [...arrTarget].sort();
                
                if (JSON.stringify(sortedG) === JSON.stringify(sortedT)) return 'correct';
                
                const hasCommon = arrGuess.some(item => arrTarget.includes(item));
                return hasCommon ? 'partial' : 'incorrect';
            }

            // --- LIDANDO COM TENTATIVAS ---
            function submitGuess(personaName) {
                const guess = guessablePersonas.find(p => p.name === personaName);
                if (!guess) return;

                input.value = '';
                autocomplete.style.display = 'none';

                const isWin = guess.name === targetPersona.name;
                const immuneGuess = getImmunities(guess);
                const immuneTarget = getImmunities(targetPersona);

                const evaluation = {
                    persona: guess,
                    arcana: guess.arcana === targetPersona.arcana ? 'correct' : 'incorrect',
                    level: {
                        status: guess.level === targetPersona.level ? 'correct' : 'incorrect',
                        direction: guess.level === targetPersona.level ? '' : (guess.level < targetPersona.level ? '⬆️' : '⬇️')
                    },
                    weak: compareArrays(guess.weak, targetPersona.weak),
                    resists: compareArrays(guess.resists, targetPersona.resists),
                    immune: compareArrays(immuneGuess, immuneTarget)
                };

                guesses.push(evaluation);
                if (currentMode === 'daily') saveDailyState();

                renderGuessRow(evaluation, guesses.length - 1);
                updateStatus();

                if (isWin) {
                    endGame(true);
                } else if (guesses.length >= MAX_GUESSES) {
                    endGame(false);
                }
            }

            function renderGuessRow(eval, rowIndex) {
                const createCell = (text, statusClass, delay) => {
                    const div = document.createElement('div');
                    div.className = `guess-cell ${statusClass}`;
                    div.innerHTML = text;
                    div.style.animation = `flipIn 0.6s ease forwards ${delay}s`;
                    return div;
                };

                const formatArray = (arr) => arr && arr.length > 0 ? arr.join(', ') : 'None';
                const p = eval.persona;

                const rowElements = [
                    createCell(p.name, 'cell-name', 0),
                    createCell(p.arcana, `cell-${eval.arcana}`, 0.3),
                    createCell(`${p.level} <span class="arrow">${eval.level.direction}</span>`, `cell-${eval.level.status}`, 0.6),
                    createCell(formatArray(p.weak), `cell-${eval.weak}`, 0.9),
                    createCell(formatArray(p.resists), `cell-${eval.resists}`, 1.2),
                    createCell(formatArray(getImmunities(p)), `cell-${eval.immune}`, 1.5)
                ];

                rowElements.forEach(el => grid.appendChild(el));
            }

            // --- AUTOCOMPLETE ---
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                autocomplete.innerHTML = '';
                if (query.length < 1) {
                    autocomplete.style.display = 'none';
                    return;
                }

                const attemptedNames = guesses.map(g => g.persona.name);
                const matches = guessablePersonas.filter(p => 
                    p.name.toLowerCase().includes(query) && !attemptedNames.includes(p.name)
                );
                
                if (matches.length > 0) {
                    autocomplete.style.display = 'block';
                    matches.slice(0, 10).forEach(persona => { 
                        const item = document.createElement('div');
                        item.className = 'result-item';
                        item.textContent = persona.name;
                        item.addEventListener('click', () => submitGuess(persona.name));
                        autocomplete.appendChild(item);
                    });
                } else {
                    autocomplete.style.display = 'none';
                }
            });

            window.addEventListener('click', (e) => {
                if(e.target !== input) autocomplete.style.display = 'none';
            });

            // --- CONTROLO DE ESTADO ---
            function updateStatus() {
                statusText.textContent = `Tentativa ${guesses.length + 1} de ${MAX_GUESSES}`;
                if (guesses.length >= MAX_GUESSES) statusText.textContent = "Tentativas Esgotadas!";
            }

            function endGame(isWin) {
                input.disabled = true;
                setTimeout(() => {
                    document.getElementById('modal-title').textContent = isWin ? 'Missão Concluída!' : 'Dark Hour Acabou!';
                    document.getElementById('modal-title').className = `modal-title ${isWin ? 'win' : 'loss'}`;
                    document.getElementById('modal-target-name').textContent = targetPersona.name;
                    
                    // Lógica para esconder o botão "Jogar Novamente" se for modo diário
                    if(currentMode === 'daily') {
                        document.getElementById('modal-msg').innerHTML = "A Persona Diária era:<br><br><small>Volte amanhã para um novo desafio!</small>";
                        playAgainBtn.style.display = 'none';
                    } else {
                        document.getElementById('modal-msg').textContent = "A Persona alvo era:";
                        playAgainBtn.style.display = 'inline-block';
                    }

                    modal.classList.add('open');
                }, 2000); // Espera a animação do CSS (flip) acabar
            }

            // Alternar Modos
            btnDaily.addEventListener('click', () => {
                if(currentMode === 'daily') return;
                currentMode = 'daily';
                btnDaily.classList.add('active');
                btnTraining.classList.remove('active');
                initGame();
            });

            btnTraining.addEventListener('click', () => {
                if(currentMode === 'training') return;
                currentMode = 'training';
                btnTraining.classList.add('active');
                btnDaily.classList.remove('active');
                initGame();
            });

            // --- EVENTOS DO MODAL ---
            playAgainBtn.addEventListener('click', () => {
                modal.classList.remove('open');
                initGame();
            });

            // Fechar o modal para ver o Grid
            viewGridBtn.addEventListener('click', () => modal.classList.remove('open'));
            closeResultBtn.addEventListener('click', () => modal.classList.remove('open'));
            window.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('open') });

            // State do Modo Diário no Cache
            function saveDailyState() {
                const today = new Date().toISOString().split('T')[0];
                const state = { date: today, guesses: guesses.map(g => g.persona.name) };
                localStorage.setItem('p3r_wordle_daily', JSON.stringify(state));
            }

            function loadDailyState() {
                const today = new Date().toISOString().split('T')[0];
                const saved = localStorage.getItem('p3r_wordle_daily');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.date === today) {
                        parsed.guesses.forEach(name => {
                            const p = guessablePersonas.find(x => x.name === name);
                            if(p) submitGuessSemAnimacao(p);
                        });
                        
                        const lastGuess = guesses[guesses.length - 1];
                        if (lastGuess && lastGuess.persona.name === targetPersona.name) {
                            endGame(true);
                        } else if (guesses.length >= MAX_GUESSES) {
                            endGame(false);
                        }
                    } else {
                        localStorage.removeItem('p3r_wordle_daily');
                    }
                }
            }

            function submitGuessSemAnimacao(guess) {
                const isWin = guess.name === targetPersona.name;
                const immuneGuess = getImmunities(guess);
                const immuneTarget = getImmunities(targetPersona);

                const evaluation = {
                    persona: guess,
                    arcana: guess.arcana === targetPersona.arcana ? 'correct' : 'incorrect',
                    level: {
                        status: guess.level === targetPersona.level ? 'correct' : 'incorrect',
                        direction: guess.level === targetPersona.level ? '' : (guess.level < targetPersona.level ? '⬆️' : '⬇️')
                    },
                    weak: compareArrays(guess.weak, targetPersona.weak),
                    resists: compareArrays(guess.resists, targetPersona.resists),
                    immune: compareArrays(immuneGuess, immuneTarget)
                };

                guesses.push(evaluation);
                
                const formatArray = (arr) => arr && arr.length > 0 ? arr.join(', ') : 'None';
                const p = evaluation.persona;
                const createCell = (text, statusClass) => {
                    const div = document.createElement('div');
                    div.className = `guess-cell ${statusClass}`;
                    div.innerHTML = text;
                    div.style.opacity = '1';
                    div.style.transform = 'rotateX(0deg)'; 
                    return div;
                };

                const rowElements = [
                    createCell(p.name, 'cell-name'),
                    createCell(p.arcana, `cell-${evaluation.arcana}`),
                    createCell(`${p.level} <span class="arrow">${evaluation.level.direction}</span>`, `cell-${evaluation.level.status}`),
                    createCell(formatArray(p.weak), `cell-${evaluation.weak}`),
                    createCell(formatArray(p.resists), `cell-${evaluation.resists}`),
                    createCell(formatArray(getImmunities(p)), `cell-${evaluation.immune}`)
                ];
                rowElements.forEach(el => grid.appendChild(el));
            }

            loadData();
        });
    </script>
</body>
</html>
